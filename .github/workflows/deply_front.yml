name: Deploy Frontend to AWS on Merge

on:
  push:
    branches:
      - main  # Trigger on push to the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up SSH agent and add key
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Sync frontend folder to AWS server
        run: |
          rsync -avz --delete -e "ssh -o StrictHostKeyChecking=no" \
          ./frontend/ ${{ secrets.AWS_USER }}@${{ secrets.AWS_HOST }}:/home/ec2-user/frontend/

      - name: SSH into AWS server and deploy frontend
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.AWS_USER }}@${{ secrets.AWS_HOST }} << 'EOF'
            # Navigate to the frontend directory
            cd /home/ec2-user/frontend/ || { echo "Frontend directory not found"; exit 1; }

            # Update system packages
            echo "Updating system packages..."
            sudo yum update -y || { echo "Failed to update system packages"; exit 1; }

            # Install Node.js and npm (version 18.x)
            echo "Checking Node.js installation..."
            NODE_REQUIRED_VERSION="18"
            if ! command -v node &> /dev/null; then
              echo "Node.js not found. Installing Node.js ${NODE_REQUIRED_VERSION}.x..."
              curl -fsSL https://rpm.nodesource.com/setup_${NODE_REQUIRED_VERSION}.x | sudo bash - || { echo "Failed to download Node.js setup script"; exit 1; }
              sudo yum install -y nodejs || { echo "Failed to install Node.js"; exit 1; }
            else
              INSTALLED_NODE_VERSION=$(node -v | grep -oE '[0-9]+' | head -1)
              if [ "$INSTALLED_NODE_VERSION" -lt "$NODE_REQUIRED_VERSION" ]; then
                echo "Node.js version is lower than required. Updating to ${NODE_REQUIRED_VERSION}.x..."
                curl -fsSL https://rpm.nodesource.com/setup_${NODE_REQUIRED_VERSION}.x | sudo bash - || { echo "Failed to download Node.js setup script"; exit 1; }
                sudo yum install -y nodejs || { echo "Failed to install Node.js"; exit 1; }
              else
                echo "Node.js is already installed. Version: $(node -v)"
              fi
            fi

            # Install project dependencies
            echo "Installing npm dependencies..."
            npm install || { echo "Failed to install npm dependencies"; exit 1; }

            # Stop any existing frontend process
            echo "Checking for existing frontend processes..."
            if pgrep -f "npm start"; then
              echo "Stopping existing frontend process..."
              pkill -f "npm start" || { echo "Failed to stop existing frontend process"; exit 1; }
            fi

            # Start the frontend application
            echo "Starting the frontend application..."
            nohup npm start > /home/ec2-user/frontend/frontend.log 2>&1 &
            if [ $? -eq 0 ]; then
              echo "Frontend deployed successfully. Logs are in /home/ec2-user/frontend/frontend.log"
            else
              echo "Failed to start the frontend application"; exit 1;
            fi
          EOF
