name: Deploy to AWS on Merge

on:
  push:
    branches:
      - main  # Trigger on push to the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up SSH agent and add key
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Sync linkedin_network to AWS server
        run: |
          rsync -avz --delete -e "ssh -o StrictHostKeyChecking=no" \
          ./linkedin_network/ ${{ secrets.AWS_USER }}@${{ secrets.AWS_HOST }}:/home/ec2-user/downloads/linkedin_network/

      - name: SSH into AWS server and deploy with Docker Compose
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.AWS_USER }}@${{ secrets.AWS_HOST }} << 'EOF'
            cd /home/ec2-user/downloads/linkedin_network/

            # Update server packages
            sudo yum update -y

            # Install Docker if not already installed
            if ! command -v docker &> /dev/null; then
              sudo amazon-linux-extras install docker -y
              sudo service docker start
              sudo usermod -a -G docker ec2-user
            fi

            # Install missing dependencies for Docker Compose
            sudo yum install -y libxcrypt-compat

            # Install Docker Compose if not already installed
            if ! command -v docker-compose &> /dev/null; then
              sudo curl -L "https://github.com/docker/compose/releases/download/1.29.2/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
              sudo chmod +x /usr/local/bin/docker-compose
            fi

            echo "ENV=prod" > .env

            # Build and start the services defined in docker-compose.yml
            /usr/local/bin/docker-compose up -d --build
          EOF
